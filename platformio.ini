; =============================================================================
; AGRINET Smart Valve Controller v4.4.0
; PlatformIO Build Configuration
; =============================================================================
;
; Quick Commands:
;   Build all:    pio run
;   Build I2C:    pio run -e stm8s003f3_i2c
;   Build UART:   pio run -e stm8s003f3_uart
;   Upload:       pio run -t upload -e stm8s003f3_i2c
;   Monitor:      pio device monitor
;   Clean:        pio run -t clean
;
; =============================================================================

[platformio]
default_envs = stm32f103c8_uart
src_dir = src
include_dir = src

[env]
build_src_filter = +<*> -<*.ino> -<stm32_compat.cpp>

; =============================================================================
; Shared settings
; =============================================================================

[common]
platform = ststm8
board = stm8s003f3
framework = arduino
upload_protocol = stlinkv2
monitor_speed = 115200
monitor_eol = CRLF
monitor_echo = yes
board_build.f_cpu = 16000000L

; =============================================================================
; I2C Slave Build (Primary for multi-valve deployments)
; I2C on PB4/PB5, UART output-only, LED on PA3
; =============================================================================

[env:stm8s003f3_i2c]
platform = ${common.platform}
board = ${common.board}
framework = ${common.framework}
lib_ignore = stm32_compat

build_flags =
    -D DEVICE_MODEL=\"AGN-GV\"
    -D FW_VERSION_STRING=\"4.4.0-I2C\"
    -D FEATURE_WATCHDOG=1
    -D FEATURE_EEPROM=1
    -D FEATURE_SLEEP=1
    -D FEATURE_LED=1
    -D FEATURE_STALL_DETECT=1
    -D FEATURE_AUTO_RECOVER=1
    -D FEATURE_VERBOSE=0
    -D FEATURE_I2C=1
    -D FEATURE_UART_COMMANDS=0
    -D FEATURE_UART_ADDRESSING=0
    --opt-code-size

upload_protocol = ${common.upload_protocol}
monitor_speed = ${common.monitor_speed}
monitor_eol = ${common.monitor_eol}
board_build.f_cpu = ${common.board_build.f_cpu}

; =============================================================================
; UART Addressed Build (Multi-valve via UART bus)
; No I2C, full UART with @<id>:command addressing, LED on PA3
; =============================================================================

[env:stm8s003f3_uart]
platform = ${common.platform}
board = ${common.board}
framework = ${common.framework}
lib_ignore = stm32_compat

build_flags =
    -D DEVICE_MODEL=\"AGN-GV\"
    -D FW_VERSION_STRING=\"4.4.0-UART\"
    -D FEATURE_WATCHDOG=1
    -D FEATURE_EEPROM=1
    -D FEATURE_SLEEP=1
    -D FEATURE_LED=1
    -D FEATURE_STALL_DETECT=1
    -D FEATURE_AUTO_RECOVER=0
    -D FEATURE_VERBOSE=0
    -D FEATURE_I2C=0
    -D FEATURE_UART_COMMANDS=1
    -D FEATURE_UART_ADDRESSING=1
    --opt-code-size

upload_protocol = ${common.upload_protocol}
monitor_speed = ${common.monitor_speed}
monitor_eol = ${common.monitor_eol}
board_build.f_cpu = ${common.board_build.f_cpu}

; =============================================================================
; Legacy Build (Single valve, no I2C, no addressing)
; =============================================================================

[env:stm8s003f3]
platform = ${common.platform}
board = ${common.board}
framework = ${common.framework}
lib_ignore = stm32_compat

build_flags =
    -D DEVICE_MODEL=\"AGN-GV\"
    -D FW_VERSION_STRING=\"4.4.0\"
    -D FEATURE_WATCHDOG=1
    -D FEATURE_EEPROM=1
    -D FEATURE_SLEEP=1
    -D FEATURE_LED=1
    -D FEATURE_STALL_DETECT=1
    -D FEATURE_AUTO_RECOVER=1
    -D FEATURE_VERBOSE=0
    -D FEATURE_I2C=0
    -D FEATURE_UART_COMMANDS=1
    -D FEATURE_UART_ADDRESSING=0
    --opt-code-size

upload_protocol = ${common.upload_protocol}
monitor_speed = ${common.monitor_speed}
monitor_eol = ${common.monitor_eol}
board_build.f_cpu = ${common.board_build.f_cpu}

; =============================================================================
; STM32F103C6 UART Build
; =============================================================================

[env:stm32f103c8_uart]
platform = ststm32
board = bluepill_f103c8
framework = arduino
build_src_filter = +<*> -<*.ino>
upload_protocol = custom
; Board has GD32F103 silicon (IDCODE 0x2ba01477) despite STM32F103C8 marking.
; Standard stlink upload_protocol rejects the clone IDCODE — use OpenOCD directly.
upload_command = /Users/venkateshprasadthota/.platformio/packages/tool-openocd/bin/openocd -s /Users/venkateshprasadthota/.platformio/packages/tool-openocd/scripts -f interface/stlink.cfg -c "transport select hla_swd" -c "set CPUTAPID 0x2ba01477" -f target/stm32f1x.cfg -c "adapter speed 240" -c "program $SOURCE 0x08000000 verify reset" -c "shutdown"

build_flags =
    -D DEVICE_MODEL=\"AGN-GV\"
    -D FW_VERSION_STRING=\"4.4.0-UART\"
    -D FEATURE_WATCHDOG=1
    -D FEATURE_EEPROM=1
    -D FEATURE_SLEEP=1
    -D FEATURE_LED=1
    -D FEATURE_STALL_DETECT=1
    -D FEATURE_AUTO_RECOVER=0
    -D FEATURE_VERBOSE=0
    -D FEATURE_I2C=0
    -D FEATURE_UART_COMMANDS=1
    -D FEATURE_UART_ADDRESSING=1

monitor_speed = 115200
monitor_eol = CRLF

; =============================================================================
; Debug Build (no watchdog, verbose output)
; =============================================================================

[env:stm8s003f3_debug]
platform = ${common.platform}
board = ${common.board}
framework = ${common.framework}
lib_ignore = stm32_compat

build_flags =
    -D DEVICE_MODEL=\"AGN-GV\"
    -D FW_VERSION_STRING=\"4.4.0-DBG\"
    -D FEATURE_WATCHDOG=0
    -D FEATURE_EEPROM=1
    -D FEATURE_SLEEP=1
    -D FEATURE_LED=1
    -D FEATURE_STALL_DETECT=1
    -D FEATURE_AUTO_RECOVER=1
    -D FEATURE_VERBOSE=0
    -D FEATURE_I2C=0
    -D FEATURE_UART_COMMANDS=1
    -D FEATURE_UART_ADDRESSING=0
    --opt-code-size

upload_protocol = ${common.upload_protocol}
monitor_speed = ${common.monitor_speed}
monitor_eol = ${common.monitor_eol}
board_build.f_cpu = ${common.board_build.f_cpu}
